<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <title>English Translation</title>

    <style>
        body {
            background: #001122;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        #header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: #001122;
            padding: 30px;
            z-index: 999;
            border-bottom: 1px solid #003355;
        }

        h1 {
            color: #66ccff;
            font-size: 60px;
            margin: 0;
        }

        #content {
            position: absolute;
            top: 140px;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto;
            padding: 30px;
        }

        #text {
            font-size: 56px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <div id="header">
        <h1>English 영어</h1>
    </div>

    <div id="content">
        <div id="text">여기에서 번역된 내용은 영어로 나오겠습니다...</div>
    </div>

    <script>
        let lastText = "";

        function scrollToBottom() {
            const content = document.getElementById("content");
            content.scrollTop = content.scrollHeight;
        }

        function updateText() {
            const text =
                localStorage.getItem("enText") ||
                "여기에서 번역된 내용은 영어로 나오겠습니다..";

            if (text !== lastText) {
                document.getElementById("text").innerText = text;
                lastText = text;
                scrollToBottom();
            }
        }

        setInterval(updateText, 300);
        updateText();
    </script>

</body>

</html>
